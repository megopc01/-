name: Blogger Perpetual SEO Poster

on:
  workflow_dispatch:

concurrency:
  group: blogger-group
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 🚀 Run Blogger Automation
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
        run: |
          pip install requests bs4 g4f google-api-python-client google-auth-httplib2 google-auth-oauthlib urllib3 -q
          
          cat << 'EOF' > blogger_script.py
          import os, asyncio, re, requests, time, json, random, urllib3
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          import g4f

          # تعطيل تحذيرات SSL
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          HISTORY_FILE = "shows_history.txt"

          def get_new_show():
              history = {}
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              parts = line.strip().split("|")
                              if len(parts) == 2:
                                  history[parts[0]] = parts[1]

              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=15)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)

                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5: continue
                      
                      # فحص شرط الـ 3 أيام
                      if title in history:
                          try:
                              last_date = datetime.strptime(history[title], '%Y-%m-%d')
                              if datetime.now() - last_date < timedelta(days=3):
                                  continue 
                          except: pass

                      i_url = img.get('src') or img.get('data-src')
                      if i_url and i_url.startswith('//'): i_url = "https:" + i_url
                      
                      s_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(s_url, verify=False, timeout=10)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else f"تفاصيل قصة مسلسل {title}"

                      return {"title": title, "desc": desc, "image": i_url}
              except Exception as e:
                  print(f"⚠️ خطأ في جلب البيانات: {e}")
                  return None
              return None

          def generate_seo_content(title, original_desc):
              print(f"🤖 جاري توليد مقال SEO لمسلسل: {title}...")
              prompt = (f"اكتب مقالاً احترافياً لمدونة بلوجر عن مسلسل بعنوان '{title}'. "
                        f"الوصف الأساسي: {original_desc}. "
                        f"يجب أن يلتزم المقال بمعايير SEO: "
                        f"1. استخدم لغة عربية فصحى جذابة وقوية. "
                        f"2. المقال يجب أن يحتوي على مقدمة، قصة المسلسل بالتفصيل، قائمة بأهم الشخصيات، مراجعة نقدية، وخاتمة. "
                        f"3. استخدم وسوم HTML مثل <h2> و <h3> و <p> و <strong> بشكل مكثف لتنظيم المقال. "
                        f"4. اجعل طول المقال طويلاً جداً (بحدود 800 - 1000 كلمة). "
                        f"5. لا تذكر روابط خارجية. فقط نص المقال بتنسيق HTML.")
              
              try:
                  response = g4f.ChatCompletion.create(
                      model=g4f.models.gpt_4,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  if response and len(response) > 300:
                      return response
                  raise Exception("استجابة AI قصيرة جداً")
              except Exception as e:
                  print(f"⚠️ فشل الذكاء الاصطناعي، استخدام المحتوى الاحتياطي: {e}")
                  return f"<h2>قصة مسلسل {title}</h2><p>{original_desc}</p><p>يعتبر مسلسل {title} من الأعمال الدرامية المميزة التي حازت على إعجاب الكثيرين...</p>"

          def post_to_blogger(title, content, image_url):
              try:
                  # تحميل بيانات الاعتماد بشكل صحيح لـ Service Account
                  creds_info = json.loads(os.environ['GOOGLE_CREDENTIALS'])
                  creds = service_account.Credentials.from_service_account_info(creds_info)
                  scoped_creds = creds.with_scopes(['https://www.googleapis.com/auth/blogger'])
                  
                  service = build('blogger', 'v3', credentials=scoped_creds)
                  blogger_id = os.environ['BLOGGER_ID']

                  full_content = f'<div style="text-align: center;"><img src="{image_url}" style="max-width: 100%; height: auto; border-radius: 10px; margin-bottom: 20px;" /></div><br>' + content

                  body = {
                      "kind": "blogger#post",
                      "title": f"تفاصيل وقصة مسلسل {title} كاملة - مراجعة شاملة وحصرية",
                      "content": full_content,
                      "labels": ["مسلسلات", "قصص مسلسلات", title, "دراما"]
                  }

                  request = service.posts().insert(blogId=blogger_id, body=body)
                  result = request.execute()
                  print(f"✅ تم نشر التدوينة بنجاح: {result['url']}")
                  return True
              except Exception as e:
                  print(f"❌ خطأ قاتل أثناء النشر: {e}")
                  return False

          print("🚀 بدء نظام النشر التلقائي (Blogger SEO Dual)...")
          start_time = time.time()
          
          while True:
              if time.time() - start_time > 18000: 
                  print("⏳ مر وقت طويل، إعادة تشغيل الجلسة...")
                  break

              show = get_new_show()
              if show:
                  print(f"🔍 معالجة مسلسل: {show['title']}")
                  seo_article = generate_seo_content(show['title'], show['desc'])
                  
                  if post_to_blogger(show['title'], seo_article, show['image']):
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{show['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                      
                      print("⏳ انتظار 60 ثانية قبل التدوينة التالية...")
                      time.sleep(60)
                  else:
                      print("⚠️ فشل النشر، محاولة مسلسل آخر بعد 30 ثانية...")
                      time.sleep(30)
              else:
                  print("😴 لا يوجد جديد (أو كل المسلسلات نُشرت في آخر 3 أيام). انتظار 5 دقائق...")
                  time.sleep(300)
          EOF
          python blogger_script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update Blogger History [skip ci]" || true
          git push || true

      - name: ⏳ Auto-Restart Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run "Blogger Perpetual SEO Poster" --ref ${{ github.ref_name }}
