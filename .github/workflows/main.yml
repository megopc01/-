name: Blogger Perpetual SEO Poster

on:
  workflow_dispatch:

concurrency:
  group: blogger-group
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🚀 Run Blogger Automation
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
          # هذا السطر مهم جداً لعرض المخرجات فوراً في GitHub Actions
          PYTHONUNBUFFERED: 1
        run: |
          pip install requests bs4 g4f google-api-python-client google-auth-httplib2 google-auth-oauthlib urllib3 -q
          
          cat << 'EOF' > blogger_script.py
          import os, asyncio, re, requests, time, json, random, urllib3, sys
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          import g4f

          # إخفاء تحذيرات SSL المزعجة التي تظهر في السجل
          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)

          HISTORY_FILE = "shows_history.txt"

          # --- دالة جلب البيانات مع فحص التاريخ (3 أيام) ---
          def get_new_show():
              print("🔍 جاري البحث عن مسلسلات جديدة...", flush=True)
              history = {}
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              parts = line.strip().split("|")
                              if len(parts) == 2:
                                  history[parts[0]] = parts[1]

              base = "https://www.shorttv.live"
              try:
                  r = requests.get(f"{base}/ar", headers={"User-Agent": "Mozilla/5.0"}, verify=False, timeout=10)
                  soup = BeautifulSoup(r.text, 'html.parser')
                  links = soup.find_all('a', href=True)
                  random.shuffle(links)

                  for a in links:
                      img = a.find('img')
                      if not img: continue
                      title = re.sub(r'[a-zA-Z]', '', img.get('alt', '')).strip()
                      if len(title) < 5: continue
                      
                      # فحص شرط الـ 3 أيام
                      if title in history:
                          last_date = datetime.strptime(history[title], '%Y-%m-%d')
                          if datetime.now() - last_date < timedelta(days=3):
                              continue 

                      i_url = img.get('src') or img.get('data-src')
                      if i_url and i_url.startswith('//'): i_url = "https:" + i_url
                      
                      s_url = a['href'] if a['href'].startswith('http') else base + a['href']
                      s_page = requests.get(s_url, verify=False, timeout=5)
                      s_soup = BeautifulSoup(s_page.text, 'html.parser')
                      meta = s_soup.find('meta', attrs={'name': 'description'})
                      desc = meta.get('content', '') if meta else "قصة درامية"

                      print(f"🎯 تم العثور على: {title}", flush=True)
                      return {"title": title, "desc": desc, "image": i_url}
              except Exception as e: 
                  print(f"⚠️ خطأ في البحث: {e}", flush=True)
                  return None
              
              print("🤷‍♂️ لم أجد مسلسلات جديدة لتوليدها.", flush=True)
              return None

          # --- دالة توليد محتوى SEO احترافي ---
          def generate_seo_content(title, original_desc):
              print(f"🤖 جاري كتابة المقال بالذكاء الاصطناعي لمسلسل '{title}'... (قد يستغرق بعض الوقت)", flush=True)
              prompt = (f"اكتب مقالاً احترافياً لمدونة بلوجر عن مسلسل بعنوان '{title}'. "
                        f"الوصف الأساسي: {original_desc}. "
                        f"يجب أن يلتزم المقال بمعايير SEO: "
                        f"1. استخدم لغة عربية فصحى جذابة. "
                        f"2. المقال يجب أن يحتوي على مقدمة، قصة المسلسل بالتفصيل، قائمة بأهم الشخصيات، مراجعة نقدية، وخاتمة. "
                        f"3. استخدم وسوم HTML مثل <h2> و <h3> و <p> و <strong>. "
                        f"4. اجعل طول المقال لا يقل عن 800 كلمة. "
                        f"5. لا تذكر روابط خارجية. فقط نص المقال بتنسيق HTML.")
              
              try:
                  response = g4f.ChatCompletion.create(
                      model=g4f.models.gpt_4,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  print("✅ تمت كتابة المقال بنجاح!", flush=True)
                  return response
              except Exception as e:
                  print(f"⚠️ فشل الذكاء الاصطناعي: {e}", flush=True)
                  return f"<h2>قصة مسلسل {title}</h2><p>{original_desc}</p>"

          # --- دالة النشر على بلوجر ---
          def post_to_blogger(title, content, image_url):
              print("📤 جاري النشر على مدونة بلوجر...", flush=True)
              try:
                  creds_data = json.loads(os.environ['GOOGLE_CREDENTIALS'])
                  
                  # الحل النهائي لمشكلة الأذونات (استخدام Service Account بدلاً من مستخدم عادي)
                  creds = service_account.Credentials.from_service_account_info(creds_data)
                  scoped_creds = creds.with_scopes(['https://www.googleapis.com/auth/blogger'])
                  
                  service = build('blogger', 'v3', credentials=scoped_creds)
                  blogger_id = os.environ['BLOGGER_ID']

                  # دمج الصورة في بداية المقال
                  full_content = f'<div style="text-align: center;"><img src="{image_url}" style="max-width: 100%; height: auto; border-radius: 10px;" /></div><br>' + content

                  body = {
                      "kind": "blogger#post",
                      "title": f"تفاصيل وقصة مسلسل {title} كاملة - مراجعة شاملة",
                      "content": full_content,
                      "labels": ["مسلسلات", "قصص مسلسلات", title]
                  }

                  posts = service.posts()
                  request = posts.insert(blogId=blogger_id, body=body)
                  result = request.execute()
                  print(f"✅ تم نشر التدوينة بنجاح: {result['url']}", flush=True)
                  return True
              except Exception as e:
                  print(f"❌ خطأ أثناء النشر: {e}", flush=True)
                  return False

          # --- الحلقة الرئيسية ---
          print("\n" + "="*50)
          print("🚀 بدء نظام النشر التلقائي (Blogger SEO Dual)...")
          print("="*50 + "\n", flush=True)
          start_time = time.time()
          
          while True:
              # التوقف بعد 4.5 ساعات لإعادة تشغيل الأكشن بأمان (GitHub limit is 6h)
              if time.time() - start_time > 16200: 
                  print("⏳ اكتمل وقت الجلسة الحالية، سيتم إعادة التشغيل لضمان الاستمرارية.", flush=True)
                  break

              show = get_new_show()
              if show:
                  seo_article = generate_seo_content(show['title'], show['desc'])
                  
                  if post_to_blogger(show['title'], seo_article, show['image']):
                      # تحديث التاريخ
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{show['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                      
                      print("⏳ انتظار 60 ثانية قبل البحث عن التدوينة التالية...\n", flush=True)
                      time.sleep(60)
                  else:
                      print("⏳ محاولة أخرى بعد 30 ثانية بسبب فشل النشر...\n", flush=True)
                      time.sleep(30)
              else:
                  print("😴 انتظار 5 دقائق للبحث مرة أخرى...\n", flush=True)
                  time.sleep(300)
          EOF
          python blogger_script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update Blogger History" || true
          git push || true

      - name: ⏳ Auto-Restart Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 جاري إعادة تشغيل الأكشن للاستمرار..."
          gh workflow run "Blogger Perpetual SEO Poster" --ref ${{ github.ref_name }}
