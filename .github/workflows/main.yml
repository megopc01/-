name: Blogger Perpetual SEO Poster

on:
  workflow_dispatch:

concurrency:
  group: blogger-group
  cancel-in-progress: true

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: 🧹 Delete Old Logs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 0
          keep_minimum_runs: 1

      - name: 🐍 Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 🚀 Run Blogger Automation
        env:
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BLOGGER_ID: ${{ secrets.BLOGGER_ID }}
          PYTHONUNBUFFERED: 1
        run: |
          pip install requests bs4 g4f google-api-python-client google-auth-httplib2 google-auth-oauthlib urllib3 -q
          
          cat << 'EOF' > blogger_script.py
          import os, asyncio, re, requests, time, json, random, urllib3, sys
          from datetime import datetime, timedelta
          from bs4 import BeautifulSoup
          from google.oauth2.credentials import Credentials
          from googleapiclient.discovery import build
          import g4f

          urllib3.disable_warnings(urllib3.exceptions.InsecureRequestWarning)
          HISTORY_FILE = "shows_history.txt"

          BAD_KEYWORDS = ["logo", "icon", "avatar", "brand", "header", "footer", "button", "banner", "sign"]

          SITES_CONFIG = [
              {"name": "ReelShort", "url": "https://www.reelshort.com/ar", "base": "https://www.reelshort.com"},
              {"name": "DramaBox", "url": "https://www.dramabox.com/ar", "base": "https://www.dramabox.com"},
              
              {"name": "FlexTV", "url": "https://flextv.cc/ar", "base": "https://flextv.cc"},
              {"name": "ShortTV", "url": "https://www.shorttv.live/ar", "base": "https://www.shorttv.live"}
          ]

          def get_history():
              history = {}
              if os.path.exists(HISTORY_FILE):
                  with open(HISTORY_FILE, "r", encoding="utf-8") as f:
                      for line in f:
                          if "|" in line:
                              parts = line.strip().split("|")
                              if len(parts) == 2:
                                  history[parts[0]] = parts[1]
              return history

          def is_valid_image(url, alt_text):
              url_lower = url.lower()
              alt_lower = alt_text.lower()
              if any(word in url_lower or word in alt_lower for word in BAD_KEYWORDS):
                  return False
              if "icon" in url_lower or "logo" in url_lower:
                  return False
              return True

          def get_new_show():
              history = get_history()
              random.shuffle(SITES_CONFIG)
              
              headers = {
                  "User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/122.0.0.0 Safari/537.36",
                  "Accept-Language": "ar-EG,ar;q=0.9,en-US;q=0.8,en;q=0.7",
                  "Accept": "text/html,application/xhtml+xml,application/xml;q=0.9,image/avif,image/webp,image/apng,*/*;q=0.8"
              }

              for site in SITES_CONFIG:
                  print(f"🔎 جاري محاولة الفحص العشوائي في موقع: {site['name']}...", flush=True)
                  try:
                      response = requests.get(site['url'], headers=headers, timeout=25, verify=False)
                      if response.status_code != 200:
                          continue

                      soup = BeautifulSoup(response.text, 'html.parser')
                      found_shows = []

                      scripts = soup.find_all('script')
                      for script in scripts:
                          if not script.string: continue
                          json_matches = re.findall(r'\{"id":.*?"title":"([^"]+)".*?"(?:cover|poster|image)":"([^"]+)"', script.string)
                          
                          for m_title, m_img in json_matches:
                              clean_title = m_title.encode().decode('unicode-escape').strip() if '\\u' in m_title else m_title.strip()
                              clean_title = re.sub(r'[a-zA-Z0-9]', '', clean_title).strip()
                              
                              if len(clean_title) > 3 and clean_title not in history:
                                  if is_valid_image(m_img, clean_title) and m_img.startswith('http'):
                                      found_shows.append({
                                          "title": clean_title,
                                          "image": m_img,
                                          "site": site['name'],
                                          "desc": f"مسلسل من منصة {site['name']}"
                                      })

                      if not found_shows:
                          for img in soup.find_all('img', alt=True):
                              raw_alt = img.get('alt', '').strip()
                              title = re.sub(r'[a-zA-Z0-9]', '', raw_alt).strip()
                              
                              if len(title) > 3 and title not in history:
                                  img_url = img.get('data-src') or img.get('data-original') or img.get('src') or img.get('srcset')
                                  if img_url:
                                      img_url = img_url.split(' ')[0] 
                                      if img_url.startswith('//'): img_url = "https:" + img_url
                                      if not img_url.startswith('http'): img_url = site['base'] + img_url
                                      
                                      if is_valid_image(img_url, raw_alt) and "base64" not in img_url:
                                          found_shows.append({
                                              "title": title,
                                              "image": img_url,
                                              "site": site['name'],
                                              "desc": f"مسلسل من منصة {site['name']}"
                                          })

                      if found_shows:
                          selected = random.choice(found_shows)
                          print(f"🎯 تم اختيار مسلسل: '{selected['title']}' من موقع {selected['site']}", flush=True)
                          return selected

                  except Exception as e:
                      print(f"⚠️ فشل الاتصال بموقع {site['name']}: {e}", flush=True)
                      continue

              print("🤷‍♂️ لم يتم العثور على أي محتوى جديد في جميع المواقع حالياً.", flush=True)
              return None

          def generate_seo_content(title, original_desc):
              print(f"🤖 جاري كتابة المقال بالذكاء الاصطناعي لمسلسل '{title}'...", flush=True)
              prompt = (f"اكتب مقالاً احترافياً لمدونة بلوجر عن مسلسل بعنوان '{title}'. "
                        f"الوصف الأساسي: {original_desc}. "
                        f"يجب أن يلتزم المقال بمعايير SEO: "
                        f"1. استخدم لغة عربية فصحى جذابة. "
                        f"2. المقال يجب أن يحتوي على مقدمة، قصة المسلسل بالتفصيل، قائمة بأهم الشخصيات، مراجعة نقدية، وخاتمة. "
                        f"3. استخدم وسوم HTML مثل <h2> و <h3> و <p> و <strong>. "
                        f"4. اجعل طول المقال لا يقل عن 800 كلمة. "
                        f"5. لا تذكر روابط خارجية. فقط نص المقال بتنسيق HTML.")
              
              try:
                  response = g4f.ChatCompletion.create(
                      model=g4f.models.gpt_4,
                      messages=[{"role": "user", "content": prompt}]
                  )
                  print("✅ تمت كتابة المقال بنجاح!", flush=True)
                  return response
              except Exception as e:
                  print(f"⚠️ فشل الذكاء الاصطناعي: {e}", flush=True)
                  return f"<h2>قصة مسلسل {title}</h2><p>{original_desc}</p>"

          def post_to_blogger(title, content, image_url):
              print("📤 جاري النشر على مدونة بلوجر...", flush=True)
              try:
                  creds_data = json.loads(os.environ['GOOGLE_CREDENTIALS'])
                  
                  creds = Credentials(
                      token=None,
                      refresh_token=creds_data['refresh_token'],
                      token_uri='https://oauth2.googleapis.com/token',
                      client_id=creds_data['client_id'],
                      client_secret=creds_data['client_secret']
                  )
                  
                  service = build('blogger', 'v3', credentials=creds)
                  blogger_id = os.environ['BLOGGER_ID']

                  full_content = f'<div style="text-align: center;"><img src="{image_url}" style="max-width: 100%; height: auto; border-radius: 10px;" /></div><br>' + content

                  body = {
                      "kind": "blogger#post",
                      "title": f"ملخص وقصة مسلسل {title} كاملة ومدبلج بالعربي - مراجعة شاملة",
                      "content": full_content,
                      "labels": ["ملخصات", "قصص مسلسلات", title]
                  }

                  posts = service.posts()
                  request = posts.insert(blogId=blogger_id, body=body)
                  result = request.execute()
                  print(f"✅ تم نشر التدوينة بنجاح: {result['url']}", flush=True)
                  return True
              except Exception as e:
                  print(f"❌ خطأ أثناء النشر: {e}", flush=True)
                  return False

          print("\n" + "="*50)
          print("🚀 بدء نظام النشر التلقائي (Blogger SEO Dual)...")
          print("="*50 + "\n", flush=True)
          start_time = time.time()
          
          while True:
              if time.time() - start_time > 16200: 
                  print("⏳ اكتمل وقت الجلسة الحالية، سيتم إعادة التشغيل لضمان الاستمرارية.", flush=True)
                  break

              show = get_new_show()
              if show:
                  seo_article = generate_seo_content(show['title'], show['desc'])
                  
                  if post_to_blogger(show['title'], seo_article, show['image']):
                      with open(HISTORY_FILE, "a", encoding="utf-8") as f:
                          f.write(f"{show['title']}|{datetime.now().strftime('%Y-%m-%d')}\n")
                      
                      print("⏳ انتظار 60 ثانية قبل البحث عن التدوينة التالية...\n", flush=True)
                      time.sleep(1500)
                  else:
                      print("⏳ محاولة أخرى بعد 30 ثانية بسبب فشل النشر...\n", flush=True)
                      time.sleep(30)
              else:
                  print("😴 انتظار 5 دقائق للبحث مرة أخرى...\n", flush=True)
                  time.sleep(300)
          EOF
          python blogger_script.py

      - name: 💾 Commit History
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add shows_history.txt || true
          git commit -m "📝 Update Blogger History" || true
          git push || true

      - name: ⏳ Auto-Restart Workflow
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "🔄 جاري إعادة تشغيل الأكشن للاستمرار..."
          gh workflow run "Blogger Perpetual SEO Poster" --ref ${{ github.ref_name }}
